<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist Cleaning Office</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="navbar">
      <a href="home.html" class="nav-item active">🏠 Home</a>
      <a href="laporan.html" class="nav-item">📊 Laporan Bulanan</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="container">
      <h3 id="welcomeUser" style="text-align: center; margin-bottom: 10px"></h3>

      <h1>🧹 Cleaning Checklist</h1>
      <p id="date"></p>

      <form id="cleaningForm">
        <div class="input-group">
          <label for="obName">Nama Petugas:</label>
          <input
            type="text"
            id="obName"
            placeholder="Masukkan nama kamu"
            required
          />
        </div>

        <div class="checklist-section">
          <h3>Daftar Tugas:</h3>

          <label class="item">
            <input type="checkbox" name="task" value="Lap List Kaca Bawah" />
            <span>Lap List Kaca Bawah</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembersihan Kaca Lobby Depan"
            />
            <span>Pembersihan Kaca Lobby Depan</span>
          </label>

          <label class="item">
            <input type="checkbox" name="task" value="Pembersihan Area Makan" />
            <span>Pembersihan Area Makan</span>
          </label>

          <label class="item">
            <input type="checkbox" id="toggleKacaDalam" />
            <span>Pembersihan Kaca All Area Dalam</span>
          </label>

          <div id="kacaDalamList" style="display: none; margin-left: 20px">
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 1"
              />
              Ruang 1</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 2"
              />
              Ruang 2</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 3"
              />
              Ruang 3</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 4"
              />
              Ruang 4</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 5"
              />
              Ruang 5</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 6"
              />
              Ruang 6</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 7"
              />
              Ruang 7</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang 8"
              />
              Ruang 8</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang Manager"
              />
              Ruang Manager</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang Direktur"
              />
              Ruang Direktur</label
            ><br />
            <label
              ><input
                type="checkbox"
                name="task"
                value="Kaca Dalam - Ruang Meeting"
              />
              Ruang Meeting</label
            ><br />
          </div>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembersihan Kaca Afilio"
            />
            <span>Pembersihan Kaca Afilio</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pencucian Kain Pel + Lobby Duster"
            />
            <span>Pencucian Kain Pel + Lobby Duster</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembersihan Karpet Lobby"
            />
            <span>Pembersihan Karpet Lobby</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pencucian Tempat Sampah"
            />
            <span>Pencucian Tempat Sampah</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembuangan Air AC Afilio"
            />
            <span>Pembuangan Air AC Afilio</span>
          </label>

          <label class="item">
            <input type="checkbox" name="task" value="Vakum All Floor" />
            <span>Vakum All Floor</span>
          </label>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembuangan Sampah All Floor"
            />
            <span>Pembuangan Sampah All Floor</span>
          </label>

          <label class="item">
            <input type="checkbox" id="togglePelArea" />
            <span>Pel Area</span>
          </label>

          <div id="pelAreaList" style="display: none; margin-left: 20px">
            <label class="item">
              <input type="checkbox" name="task" value="Pel Area - Pantry" />
              <span>Pantry</span>
            </label>

            <label class="item">
              <input type="checkbox" name="task" value="Pel Area - Loker" />
              <span>Loker</span>
            </label>

            <label class="item">
              <input type="checkbox" name="task" value="Pel Area - Lantai L" />
              <span>Lantai L</span>
            </label>
          </div>

          <label class="item">
            <input
              type="checkbox"
              name="task"
              value="Pembersihan Sarang Laba-laba"
            />
            <span>Pembersihan Sarang Laba-laba</span>
          </label>
        </div>

        <div class="upload-section">
          <h3>Bukti Foto:</h3>
          <input
            type="file"
            id="photoUpload"
            accept="image/*"
            capture="environment"
            required
          />
          <div id="preview"></div>
        </div>

        <button type="submit" id="submitBtn">Kirim Laporan</button>
      </form>
      <h2>Status Hari Ini</h2>
      <div id="dataList"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
